<div class="timer-section">
    <div class="timer-container">
        <span class="timer-label">競技用タイマー</span>
        <div id="display" class="timer-digits">03:00</div>
        <div class="timer-controls">
            <button id="startBtn" class="btn-timer-primary">タイマー開始</button>
            <button id="resetBtn" class="btn-timer-outline">リセット</button>
        </div>
    </div>
</div>

<style>
    /* 販売向け：落ち着いた配色とデザイン */
    .timer-section {
        margin: 15px auto;
        width: 90%;
        max-width: 400px;
    }

    .timer-container {
        background-color: #ffffff;
        border: 1px solid #dcdcdc;
        border-radius: 10px;
        padding: 15px;
        text-align: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .timer-label {
        font-size: 0.85rem;
        color: #555;
        font-weight: bold;
        display: block;
        margin-bottom: 5px;
    }

    .timer-digits {
        font-size: 2.5rem;
        font-weight: 700;
        color: #1a1a1a;
        margin: 10px 0;
        font-family: 'Courier New', Courier, monospace;
    }

    .timer-controls {
        display: flex;
        justify-content: center;
        gap: 10px;
    }

    /* 開始ボタン：しっかりとした濃紺 */
    .btn-timer-primary {
        background-color: #2c3e50;
        color: #ffffff;
        border: none;
        padding: 10px 25px;
        border-radius: 5px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
    }

    /* リセットボタン：控えめなデザイン */
    .btn-timer-outline {
        background-color: transparent;
        color: #666;
        border: 1px solid #ccc;
        padding: 10px 20px;
        border-radius: 5px;
        font-size: 0.9rem;
        cursor: pointer;
    }

    .btn-timer-primary:active, .btn-timer-outline:active {
        opacity: 0.7;
    }
</style>
