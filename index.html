<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKE-UM7 Pro 修練記録</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        .header { text-align: center; padding: 10px; background: #b03a2e; color: white; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-new { flex: 2; background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1b5e20; }
        .btn-stats { flex: 1; background: #2c3e50; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1a252f; }
        .btn-new:active, .btn-stats:active { transform: translateY(2px); box-shadow: 0 2px 0 #1b5e20; }
        .set-card { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .latest-card { border: 2px solid #b03a2e; background: #fffdfd; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .score-input { width: 100%; height: 45px; font-size: 22px; text-align: center; border: 1px solid #bbb; border-radius: 6px; background: #fff; }
        .total-row { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed #ccc; padding-top: 10px; }
        .total-val { font-size: 1.5em; font-weight: bold; color: #b03a2e; }
        .memo-area { width: 100%; margin-top: 10px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 15px; background: #f9f9f9; }
        #analysis-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; color: white; }
        .stats-card { background: #222; border: 1px solid #b03a2e; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .stats-grid { display: flex; justify-content: space-around; text-align: center; margin-top: 10px; }
        .stats-num { font-size: 1.4em; font-weight: bold; color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>氣 TAKE-UM7</h1></div>
        <div class="btn-row">
            <button class="btn-new" onclick="addNewSet()">＋ 新セット</button>
            <button class="btn-stats" onclick="showAnalysis()">分析表示</button>
        </div>
        <div id="records-list"></div>
    </div>
    <div id="analysis-overlay">
        <h2 style="border-bottom: 2px solid #b03a2e;">修練の軌跡</h2>
        <div id="stats-content"></div>
        <button onclick="hideAnalysis()" style="width:100%; padding:15px; background:#444; color:white; border:none; border-radius:8px; margin-top:20px;">戻る</button>
    </div>
    <script>
        let db = JSON.parse(localStorage.getItem('take_um7_pro_v3') || '[]');
        function save() { localStorage.setItem('take_um7_pro_v3', JSON.stringify(db.slice(0, 50))); }
        function render() {
            const list = document.getElementById('records-list');
            list.innerHTML = '';
            db.forEach((set, idx) => {
                const card = document.createElement('div');
                card.className = 'set-card' + (idx === 0 ? ' latest-card' : '');
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:0.85em; color:#666; margin-bottom:10px;">
                        <span>第${db.length - idx}セット</span><span>${set.time}</span>
                    </div>
                    <div class="grid">
                        ${set.scores.map((s, i) => `<div><label style="font-size:0.7em;">R${i+1}</label><br>
                        <input type="number" class="score-input" value="${s}" oninput="update(${idx}, ${i}, this)"></div>`).join('')}
                    </div>
                    <div class="total-row">
                        <div>
                            <label><input type="checkbox" ${set.c1?'checked':''} onchange="upChk(${idx},'c1',this.checked)">点</label>
                            <label><input type="checkbox" ${set.c2?'checked':''} onchange="upChk(${idx},'c2',this.checked)">中</label>
                            <label><input type="checkbox" ${set.c3?'checked':''} onchange="upChk(${idx},'c3',this.checked)">上</label>
                        </div>
                        <div class="total-val" id="total-${idx}">計 ${set.total} 点</div>
                    </div>
                    <textarea class="memo-area" rows="2" placeholder="気づき・所作のメモ" oninput="upMemo(${idx},this.value)">${set.memo||''}</textarea>
                `;
                list.appendChild(card);
            });
        }
        function addNewSet() {
            const d = new Date();
            const time = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
            db.unshift({ time: time, scores:['','','','','',''], total:0, c1:false, c2:false, c3:false, memo:'', ts: Date.now() });
            save(); render();
        }
        function update(idx, rIdx, el) {
            if (el.value.length > 5) el.value = el.value.slice(0, 5);
            db[idx].scores[rIdx] = el.value;
            let sum = 0;
            db[idx].scores.forEach(s => { for (let char of s.toString()) { let n = parseInt(char); if (!isNaN(n)) sum += n; } });
            db[idx].total = sum;
            document.getElementById(`total-${idx}`).innerText = `計 ${sum} 点`;
            save();
        }
        function upChk(idx, k, v) { db[idx][k] = v; save(); }
        function upMemo(idx, v) { db[idx].memo = v; save(); }
        
        function showAnalysis() {
            const now = new Date();
            const stats = (data) => {
                // 修正ポイント：0点（未入力セット）を除外して計算する
                const validScores = data.map(d => d.total).filter(score => score > 0);
                if (validScores.length === 0) return { max:0, avg:0, min:0 };
                return { 
                    max: Math.max(...validScores), 
                    min: Math.min(...validScores), 
                    avg: (validScores.reduce((a,b)=>a+b,0)/validScores.length).toFixed(1) 
                };
            };
            const last10 = stats(db.slice(0, 10));
            const monthly = stats(db.filter(d => new Date(d.ts).getMonth() === now.getMonth()));
            const yearly = stats(db.filter(d => new Date(d.ts).getFullYear() === now.getFullYear()));
            document.getElementById('stats-content').innerHTML = `${statCard("直近10回", last10)}${statCard("今月の平均", monthly)}${statCard("今年の記録", yearly)}`;
            document.getElementById('analysis-overlay').style.display = 'block';
        }
        function statCard(label, s) {
            return `<div class="stats-card"><div>${label}</div><div class="stats-grid">
                <div><small>最高</small><br><span class="stats-num">${s.max}</span></div>
                <div><small>平均</small><br><span class="stats-num">${s.avg}</span></div>
                <div><small>最低</small><br><span class="stats-num">${s.min}</span></div>
            </div></div>`;
        }
        function hideAnalysis() { document.getElementById('analysis-overlay').style.display = 'none'; }
        if(db.length === 0) addNewSet(); else render();
    </script>
</body>
</html>
