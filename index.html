<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKE-UM7 Final</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-green: #27ae60;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* タイマーエリア（コンパクト） */
        .timer-mini-card { background: #f0f0f0; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; border-left: 5px solid var(--primary-color); }
        #timer-display { font-size: 2rem; font-weight: bold; margin: 0; }
        .timer-btn { background: var(--primary-color); color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; margin-top: 5px; }

        /* ナビゲーションボタン（以前の使いやすさを再現） */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .nav-btn { background: #fff; border: 1px solid #ccc; padding: 10px; border-radius: 5px; text-decoration: none; color: #333; font-size: 0.85rem; text-align: center; font-weight: bold; }

        /* スコア入力ボタン */
        .score-section { border-top: 2px solid var(--accent-green); padding-top: 15px; }
        .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .score-button { background: #fff; border: 2px solid var(--primary-color); padding: 15px 5px; border-radius: 10px; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .score-button:active { background: var(--primary-color); color: white; }
        .save-button { width: 100%; background: var(--accent-green); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; font-size: 1.2rem; margin: 0 0 15px 0;">TAKE-UM7</h1>

    <div id="timer-box" class="timer-mini-card">
        <div id="timer-status" style="font-size: 0.7rem;">吹矢 3分タイマー</div>
        <div id="timer-display">03:00</div>
        <button class="timer-btn" onclick="startFukiyaTimer()">タイマー開始</button>
    </div>

    <div class="nav-grid">
        <a href="#recent" class="nav-btn">📊 直近10</a>
        <a href="#month" class="nav-btn">📅 今月</a>
        <a href="#year" class="nav-btn">🏆 今年</a>
        <a href="#history" class="nav-btn">📝 全履歴</a>
    </div>

    <div class="score-section">
        <h2 style="font-size: 1rem; margin-bottom: 10px;">スコア入力</h2>
        <div class="score-grid">
            <button class="score-button" onclick="handleScore(7)">7</button>
            <button class="score-button" onclick="handleScore(5)">5</button>
            <button class="score-button" onclick="handleScore(3)">3</button>
            <button class="score-button" onclick="handleScore(1)">1</button>
            <button class="score-button" onclick="handleScore(0)" style="grid-column: span 4; background: #eee;">0 / 失格</button>
        </div>
        <div style="text-align:center; margin-bottom: 10px;">
            <span style="font-size: 0.9rem;">現在:</span>
            <span id="score-list" style="font-weight: bold; color: #e74c3c;">-</span>
            <div style="font-size: 1.5rem; font-weight: bold;">合計: <span id="score-total">0</span> 点</div>
        </div>
        <button class="save-button" onclick="handleSave()">この結果を保存</button>
    </div>
</div>

<script>
    let scores = [];
    
    function handleScore(p) {
        if (scores.length < 5) {
            scores.push(p);
            document.getElementById('score-list').innerText = scores.join(' , ');
            document.getElementById('score-total').innerText = scores.reduce((a, b) => a + b, 0);
        } else {
            alert("5本入力済みです！保存してください。");
        }
    }

    function handleSave() {
        if (scores.length === 0) return;
        alert("保存しました！ (※練習用表示)");
        scores = [];
        document.getElementById('score-list').innerText = "-";
        document.getElementById('score-total').innerText = "0";
    }

    // タイマー機能
    let tInterval;
    function speak(txt) {
        const u = new SpeechSynthesisUtterance(txt);
        u.lang = 'ja-JP';
        window.speechSynthesis.speak(u);
    }
    function startFukiyaTimer() {
        if (tInterval) clearInterval(tInterval);
        let sec = 180;
        document.getElementById('timer-display').innerText = "03:00";
        setTimeout(() => {
            speak("ようい");
            setTimeout(() => {
                speak("始め");
                document.getElementById('timer-box').style.background = "#e1f5fe";
                tInterval = setInterval(() => {
                    sec--;
                    let m = Math.floor(sec / 60).toString().padStart(2,'0');
                    let s = (sec % 60).toString().padStart(2,'0');
                    document.getElementById('timer-display').innerText = `${m}:${s}`;
                    if (sec === 30) { speak("30秒前"); document.getElementById('timer-box').style.background = "#fff3e0"; }
                    if (sec <= 0) {
                        clearInterval(tInterval);
                        speak("終了");
                        document.getElementById('timer-box').style.background = "#ffebee";
                    }
                }, 1000);
            }, 2000);
        }, 3000);
    }
</script>
</body>
</html>
