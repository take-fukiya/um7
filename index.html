<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKE-UM7 Complete</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-blue: #2980b9;
            --accent-green: #27ae60;
            --accent-orange: #f39c12;
            --accent-red: #e74c3c;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* タイマーをコンパクトに */
        .timer-mini-card {
            background: #eee;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 5px solid var(--primary-color);
            transition: all 0.3s;
        }
        #timer-display { font-size: 2rem; font-weight: bold; margin: 5px 0; }
        .timer-btn { background: var(--primary-color); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        /* 分析ボタンエリア（復活！） */
        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .nav-btn {
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary-color);
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            display: block;
        }
        .nav-btn:active { background: #e9ecef; }

        /* 入力エリア */
        .score-input-area { background: #fdfdfd; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        h2 { font-size: 1.1rem; border-bottom: 2px solid var(--accent-green); display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; font-size: 1.2rem;">TAKE-UM7</h1>

    <div id="timer-box" class="timer-mini-card">
        <div id="timer-status" style="font-size: 0.8rem;">競技用タイマー</div>
        <div id="timer-display">03:00</div>
        <button id="timer-start-btn" class="timer-btn" onclick="startFukiyaTimer()">開始</button>
    </div>

    <div class="analysis-grid">
        <a href="#stats-recent" class="nav-btn">📊 直近10セット</a>
        <a href="#stats-month" class="nav-btn">📅 今月の成績</a>
        <a href="#stats-year" class="nav-btn">🏆 今年の成績</a>
        <a href="#history" class="nav-btn">📝 全履歴確認</a>
    </div>

    <hr>

    <div class="score-input-area">
        <h2>スコア入力</h2>
        <p style="font-size: 0.8rem; color: #666;">（ここにいつもの入力フォームが続きます）</p>
        </div>
</div>

<script>
    // タイマーのロジック（そのまま維持）
    let timer;
    let timeLeft = 180;
    const statusEl = document.getElementById('timer-status');
    const displayEl = document.getElementById('timer-display');
    const boxEl = document.getElementById('timer-box');

    function speak(text) {
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        window.speechSynthesis.speak(uttr);
    }

    function updateDisplay(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        displayEl.innerText = `${m}:${s}`;
    }

    function startFukiyaTimer() {
        if (timer) clearInterval(timer);
        timeLeft = 180;
        updateDisplay(timeLeft);
        statusEl.innerText = "まもなく開始...";
        setTimeout(() => {
            speak("ようい");
            statusEl.innerText = "ようい";
            setTimeout(() => {
                speak("始め");
                statusEl.innerText = "競技中";
                boxEl.style.backgroundColor = "#e1f5fe";
                timer = setInterval(() => {
                    timeLeft--;
                    updateDisplay(timeLeft);
                    if (timeLeft === 30) { speak("30秒前"); boxEl.style.backgroundColor = "#fff3e0"; }
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        speak("終了");
                        statusEl.innerText = "終了！";
                        boxEl.style.backgroundColor = "#ffebee";
                    }
                }, 1000);
            }, 2000);
        }, 3000);
    }
</script>

</body>
</html>
