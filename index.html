<script>
        // --- タイマー機能 ---
        let timeLeft = 180;
        let timerId = null;
        function speak(text) { const uttr = new SpeechSynthesisUtterance(text); uttr.lang = 'ja-JP'; window.speechSynthesis.speak(uttr); }

        async function startTimerSequence() {
            if (timerId !== null) return;
            const status = document.getElementById('timerStatus');
            const btn = document.getElementById('timerActionBtn');
            btn.disabled = true;
            status.innerText = "3秒前...";
            await new Promise(r => setTimeout(r, 3000));
            speak("用意");
            status.innerText = "用意...";
            await new Promise(r => setTimeout(r, 2000));
            speak("はじめ");
            status.innerText = "競技中！";
            btn.disabled = false;
            btn.innerText = "停止";
            btn.onclick = toggleTimer;
            runTimer();
        }

        function runTimer() {
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateTimerDisplay();
                    if (timeLeft === 30) speak("30秒前");
                } else {
                    clearInterval(timerId); timerId = null; speak("終了");
                    document.getElementById('timerStatus').innerText = "競技終了";
                }
            }, 1000);
        }

        function toggleTimer() {
            const btn = document.getElementById('timerActionBtn');
            if (timerId) { clearInterval(timerId); timerId = null; btn.innerText = "再開"; }
            else { btn.innerText = "停止"; runTimer(); }
        }

        function resetTimer() {
            clearInterval(timerId); timerId = null; timeLeft = 180; updateTimerDisplay();
            const btn = document.getElementById('timerActionBtn');
            btn.innerText = "開始"; btn.disabled = false; btn.onclick = startTimerSequence;
            document.getElementById('timerStatus').innerText = "競技用タイマー";
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
            document.getElementById('timerDisplay').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        // --- 記録・分析機能 ---
        // 以前のデータ（fukiya_sets_v2）を引き継ぎます
        let sets = JSON.parse(localStorage.getItem('fukiya_sets_v2') || '[]');

        function save() { localStorage.setItem('fukiya_sets_v2', JSON.stringify(sets)); }

        // 【新機能】直近10セットの分析
        function analyzeRecent() {
            if (sets.length === 0) {
                alert("まだ修練データがありません。");
                return;
            }
            // 直近10個（またはそれ以下）のデータを取得
            const recent = sets.slice(0, 10);
            const scores = recent.map(s => s.total);
            const max = Math.max(...scores);
            const min = Math.min(...scores);
            const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(1);

            alert(`【直近${recent.length}セットの分析結果】\n\n最高点： ${max}点\n平均点： ${avg}点\n最低点： ${min}点`);
        }

        function renderSets() {
            const root = document.getElementById('records-root');
            root.innerHTML = '';
            sets.forEach((set, idx) => {
                const div = document.createElement('div');
                div.className = 'set-container' + (idx === 0 ? ' latest' : '');
                div.innerHTML = `
                    <h2>第${sets.length - idx}セット <span style="font-size:0.8em; color:#888;">(${set.time})</span></h2>
                    <div class="score-grid">
                        ${set.scores.map((s, rIdx) => `
                            <div><label style="font-size:0.7em; color:#666;">R${rIdx+1} (5本)</label><br>
                            <input type="text" inputmode="numeric" class="score-input" value="${s}" 
                                   maxlength="5" oninput="update(${idx}, ${rIdx}, this)" placeholder=""></div>
                        `).join('')}
                    </div>
                    <div class="check-group">
                        <label><input type="checkbox" ${set.c1?'checked':''} onchange="updateCheck(${idx}, 'c1', this.checked)"> 点</label>
                        <label><input type="checkbox" ${set.c2?'checked':''} onchange="updateCheck(${idx}, 'c2', this.checked)"> 線</label>
                        <label><input type="checkbox" ${set.c3?'checked':''} onchange="updateCheck(${idx}, 'c3', this.checked)"> 睨</label>
                    </div>
                    <span class="total-display" id="total-${idx}">合計：${set.total} 点</span>
                    <textarea class="memo-area" rows="2" placeholder="備考・氣づき・所作のメモ" oninput="updateMemo(${idx}, this.value)">${set.memo||''}</textarea>
                `;
                root.appendChild(div);
            });
        }

        function addNewSet() {
            const now = new Date();
            const timeStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
            sets.unshift({ time: timeStr, scores:['','','','','',''], total:0, c1:false, c2:false, c3:false, memo:'' });
            save(); renderSets();
        }

        function update(idx, rIdx, el) {
            if (el.value.length > 5) el.value = el.value.slice(0, 5);
            sets[idx].scores[rIdx] = el.value;
            let grandTotal = 0;
            sets[idx].scores.forEach(s => {
                let scoreStr = s.toString();
                for (let char of scoreStr) {
                    let n = parseInt(char);
                    if (!isNaN(n)) grandTotal += n;
                }
            });
            sets[idx].total = grandTotal;
            document.getElementById(`total-${idx}`).innerText = `合計：${grandTotal} 点`;
            save();
        }

        function updateCheck(idx, key, val) { sets[idx][key] = val; save(); }
        function updateMemo(idx, val) { sets[idx].memo = val; save(); }

        if(sets.length === 0) addNewSet(); else renderSets();
    </script>
