<div class="timer-outer-box">
    <div class="fukiya-timer-card">
        <span class="fukiya-label">競技用タイマー</span>
        <div id="timerDisplay" class="fukiya-digits">03:00</div>
        
        <div class="fukiya-controls">
            <button id="startBtn" onclick="toggleTimer()" class="fukiya-btn-start">タイマー開始</button>
            <button id="resetBtn" onclick="resetTimer()" class="fukiya-btn-reset">リセット</button>
        </div>
    </div>
</div>

<style>
    /* 1. 画面いっぱいに広げる設定 */
    .timer-outer-box {
        width: 100% !important;
        display: flex;
        justify-content: center;
        padding: 10px 0;
    }

    .fukiya-timer-card {
        width: 95% !important; /* スマホ画面の端まで使います */
        max-width: 500px;
        background-color: #ffffff;
        border: 2px solid #2c3e50; /* 少し線を太くして存在感を出しました */
        border-radius: 15px;
        padding: 30px 10px;
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        box-sizing: border-box;
    }

    /* 2. 文字を圧倒的に大きく */
    .fukiya-digits {
        font-size: 6rem !important; /* 限界まで大きくしました */
        font-weight: bold;
        color: #1a1a1a;
        margin: 10px 0;
        font-family: 'Courier New', Courier, monospace;
    }

    .fukiya-label { font-size: 1.2rem; color: #666; }

    /* 3. ボタンを押しやすく */
    .fukiya-controls { display: flex; justify-content: center; gap: 15px; }
    
    .fukiya-btn-start {
        background-color: #2c3e50;
        color: white;
        border: none;
        padding: 20px 30px;
        border-radius: 10px;
        font-size: 1.3rem;
        font-weight: bold;
        cursor: pointer;
        flex: 2;
    }

    .fukiya-btn-reset {
        background-color: #f8f9fa;
        color: #333;
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 10px;
        font-size: 1.1rem;
        flex: 1;
    }
</style>

<script>
    // --- タイマーを動かすための命令（JavaScript） ---
    let timeLeft = 180; // 3分 = 180秒
    let timerId = null;

    function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        document.getElementById('timerDisplay').innerText = 
            `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function toggleTimer() {
        const btn = document.getElementById('startBtn');
        if (timerId === null) {
            // カウントダウン開始
            btn.innerText = "一時停止";
            btn.style.backgroundColor = "#e74c3c"; // 停止中は赤っぽく
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    clearInterval(timerId);
                    timerId = null;
                    alert("時間終了です！");
                    btn.innerText = "タイマー開始";
                    btn.style.backgroundColor = "#2c3e50";
                }
            }, 1000);
        } else {
            // 一時停止
            clearInterval(timerId);
            timerId = null;
            btn.innerText = "再開";
            btn.style.backgroundColor = "#2c3e50";
        }
    }

    function resetTimer() {
        clearInterval(timerId);
        timerId = null;
        timeLeft = 180;
        updateDisplay();
        const btn = document.getElementById('startBtn');
        btn.innerText = "タイマー開始";
        btn.style.backgroundColor = "#2c3e50";
    }
</script>
