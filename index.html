<div class="fukiya-timer-full">
    <div class="fukiya-timer-card">
        <span class="fukiya-label">競技用タイマー</span>
        <div id="display" class="fukiya-digits">03:00</div>
        <div class="fukiya-controls">
            <button id="startBtn" class="fukiya-btn-start">タイマー開始</button>
            <button id="resetBtn" class="fukiya-btn-reset">リセット</button>
        </div>
    </div>
</div>

<style>
    /* 画面全体に対する設定 */
    .fukiya-timer-full {
        width: 100vw;          /* 画面の横幅いっぱい */
        margin-left: calc(-50vw + 50%); /* 親要素の幅を無視して画面端まで広げるおまじない */
        margin-right: calc(-50vw + 50%);
        display: flex;
        justify-content: center;
        margin-top: 20px;
        margin-bottom: 20px;
    }

    .fukiya-timer-card {
        width: 92%;            /* 画面の92%を使って表示 */
        max-width: 500px;      /* 大きくなりすぎない上限 */
        background-color: #ffffff;
        border: 1px solid #e0e0e0;
        border-radius: 15px;
        padding: 30px 10px;    /* 上下をたっぷり広く */
        text-align: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        box-sizing: border-box;
    }

    .fukiya-label {
        font-size: 1.1rem;
        color: #666;
        letter-spacing: 0.1rem;
    }

    .fukiya-digits {
        font-size: 5rem;       /* 数字をさらに大きくしました！ */
        font-weight: bold;
        color: #1a1a1a;
        margin: 15px 0;
        font-family: 'Courier New', Courier, monospace;
        line-height: 1;
    }

    .fukiya-controls {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 10px;
    }

    /* 開始ボタン：大きく、押しやすく */
    .fukiya-btn-start {
        background-color: #2c3e50;
        color: #ffffff;
        border: none;
        padding: 18px 40px;
        border-radius: 10px;
        font-size: 1.2rem;
        font-weight: bold;
        flex: 2;               /* 開始ボタンを少し長めに */
    }

    /* リセットボタン：シンプルに */
    .fukiya-btn-reset {
        background-color: #f8f9fa;
        color: #666;
        border: 1px solid #ccc;
        padding: 18px 25px;
        border-radius: 10px;
        font-size: 1.1rem;
        flex: 1;
    }
</style>
