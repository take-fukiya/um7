<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKE-UMU 7</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary-color: #1e293b;
            --accent-red: #e11d48;
            --accent-green: #10b981;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; color: #334155; }
        .container { width: 100%; max-width: 480px; background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* タイマーエリア */
        .timer-card { background: var(--primary-color); color: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 20px; position: relative; }
        .timer-label { font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px; }
        #timer-display { font-size: 3.5rem; font-weight: bold; font-family: monospace; line-height: 1; margin: 10px 0; }
        .timer-controls { display: flex; gap: 10px; justify-content: center; }
        .btn-timer { background: white; color: var(--primary-color); border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* ナビゲーション */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .nav-btn { background: #fff; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; text-decoration: none; color: #475569; font-size: 0.85rem; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* スコア入力セクション */
        .input-card { border: 2px solid #f1f5f9; padding: 15px; border-radius: 15px; position: relative; }
        .input-title { color: var(--accent-red); font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px solid #fee2e2; padding-bottom: 5px; }
        
        /* 点数ボタン：7を最大に */
        .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-score { background: #fff; border: 2px solid var(--primary-color); padding: 15px 0; border-radius: 12px; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-score:active { background: var(--primary-color); color: white; }
        .btn-score.btn-zero { grid-column: span 4; background: #f8fafc; border-color: #cbd5e1; font-size: 1rem; padding: 10px; }

        /* 三点チェック：点・中・瞬 */
        .check-group { display: flex; justify-content: space-around; background: #f1f5f9; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .check-item { display: flex; align-items: center; gap: 5px; font-weight: bold; font-size: 1.1rem; }
        .check-item input { width: 20px; height: 20px; }

        /* 合計表示 */
        .total-box { text-align: center; margin-bottom: 15px; }
        .score-row { font-size: 1rem; color: #64748b; min-height: 1.2rem; margin-bottom: 5px; }
        .total-val { font-size: 2rem; font-weight: bold; color: var(--primary-color); }

        .btn-save { width: 100%; background: var(--accent-red); color: white; border: none; padding: 18px; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; font-size: 1.5rem; margin: 0 0 15px 0; letter-spacing: 2px;">TAKE-UMU 7</h1>

    <div id="timer-box" class="timer-card">
        <div class="timer-label">競技用タイマー (3分)</div>
        <div id="timer-display">03:00</div>
        <div class="timer-controls">
            <button class="btn-timer" onclick="startFukiyaTimer()">開始</button>
            <button class="btn-timer" style="background:transparent; color:white; border:1px solid white;" onclick="resetTimer()">リセット</button>
        </div>
    </div>

    <div class="nav-grid">
        <a href="#recent" class="nav-btn">📊 直近10</a>
        <a href="#month" class="nav-btn">📅 今月</a>
        <a href="#year" class="nav-btn">🏆 今年</a>
        <a href="#history" class="nav-btn">📝 全履歴</a>
    </div>

    <div class="input-card">
        <div class="input-title">第65セット (練習モード)</div>
        
        <div class="check-group">
            <label class="check-item"><input type="checkbox"> 点</label>
            <label class="check-item"><input type="checkbox"> 中</label>
            <label class="check-item"><input type="checkbox"> 瞬</label>
        </div>

        <div class="score-grid">
            <button class="btn-score" onclick="addScore(7)" style="border-width: 3px; color: var(--accent-red);">7</button>
            <button class="btn-score" onclick="addScore(5)">5</button>
            <button class="btn-score" onclick="addScore(3)">3</button>
            <button class="btn-score" onclick="addScore(1)">1</button>
            <button class="btn-score btn-zero" onclick="addScore(0)">0 / 失格</button>
        </div>

        <div class="total-box">
            <div id="score-line" class="score-row">-</div>
            <div class="total-val">合計：<span id="score-total">0</span> 点</div>
        </div>

        <button class="btn-save" onclick="saveResult()">この修練セットを保存</button>
    </div>
</div>

<script>
    let currentScores = [];
    
    function addScore(p) {
        if (currentScores.length < 5) {
            currentScores.push(p);
            document.getElementById('score-line').innerText = currentScores.join(' - ');
            document.getElementById('score-total').innerText = currentScores.reduce((a, b) => a + b, 0);
        } else {
            alert("5本吹き終わりました。保存してください！");
        }
    }

    function saveResult() {
        if (currentScores.length === 0) return;
        const total = currentScores.reduce((a, b) => a + b, 0);
        if(total === 35) alert("✨パーフェクト！7点×5本達成！✨");
        else alert("スコアを保存しました！");
        
        currentScores = [];
        document.getElementById('score-line').innerText = "-";
        document.getElementById('score-total').innerText = "0";
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    let tInt;
    function speak(t) {
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'ja-JP';
        window.speechSynthesis.speak(u);
    }

    function startFukiyaTimer() {
        if (tInt) clearInterval(tInt);
        let sec = 180;
        speak("ようい");
        setTimeout(() => {
            speak("始め");
            document.getElementById('timer-box').style.background = "#0f172a";
            tInt = setInterval(() => {
                sec--;
                let m = Math.floor(sec/60).toString().padStart(2,'0');
                let s = (sec%60).toString().padStart(2,'0');
                document.getElementById('timer-display').innerText = `${m}:${s}`;
                if (sec === 30) { speak("30秒前"); document.getElementById('timer-box').style.background = "#334155"; }
                if (sec <= 0) {
                    clearInterval(tInt);
                    speak("終了");
                    document.getElementById('timer-box').style.background = "#1e293b";
                }
            }, 1000);
        }, 3000);
    }

    function resetTimer() {
        clearInterval(tInt);
        document.getElementById('timer-display').innerText = "03:00";
        document.getElementById('timer-box').style.background = "#1e293b";
    }
</script>
</body>
</html>
