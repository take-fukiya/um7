<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAKE-UM7 with Timer</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-green: #27ae60;
            --accent-blue: #2980b9;
            --accent-orange: #f39c12;
            --accent-red: #e74c3c;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--primary-color); font-size: 1.5rem; }
        
        /* タイマーセクション */
        .timer-section {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: background 0.3s;
        }
        #timer-display {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }
        #timer-status {
            font-weight: bold;
            height: 1.5rem;
        }
        .timer-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        .timer-btn:active { transform: scale(0.98); }

        /* 入力エリア（既存機能） */
        .score-input {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        /* ... 他のスタイルは竹さんの使いやすい現在の形を維持 ... */
    </style>
</head>
<body>

<div class="container">
    <h1>TAKE-UM7 競技タイマー</h1>

    <div id="timer-box" class="timer-section">
        <div id="timer-status">待機中</div>
        <div id="timer-display">03:00</div>
        <button id="timer-start-btn" class="timer-btn" onclick="startFukiyaTimer()">タイマー開始</button>
    </div>

    <hr>
    <p style="text-align:center; font-size: 0.9rem; color: #666;">※ここにスコア入力フォームや履歴が表示されます</p>
</div>

<script>
    let timer;
    let timeLeft = 180;
    const statusEl = document.getElementById('timer-status');
    const displayEl = document.getElementById('timer-display');
    const boxEl = document.getElementById('timer-box');

    // 音声読み上げ機能
    function speak(text) {
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        uttr.rate = 1.0;
        window.speechSynthesis.speak(uttr);
    }

    function updateDisplay(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        displayEl.innerText = `${m}:${s}`;
    }

    function startFukiyaTimer() {
        if (timer) clearInterval(timer);
        
        timeLeft = 180;
        updateDisplay(timeLeft);
        statusEl.innerText = "まもなく開始...";
        boxEl.style.backgroundColor = "#eee";

        // 3秒後に「ようい」
        setTimeout(() => {
            speak("ようい");
            statusEl.innerText = "ようい";
            
            // さらに2秒後に「始め」
            setTimeout(() => {
                speak("始め");
                statusEl.innerText = "競技中";
                boxEl.style.backgroundColor = "#e1f5fe"; // 青色（集中）

                timer = setInterval(() => {
                    timeLeft--;
                    updateDisplay(timeLeft);

                    if (timeLeft === 30) {
                        speak("30秒前");
                        boxEl.style.backgroundColor = "#fff3e0"; // オレンジ（注意）
                    }

                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        speak("終了");
                        statusEl.innerText = "終了！";
                        boxEl.style.backgroundColor = "#ffebee"; // 赤色（完了）
                    }
                }, 1000);
            }, 2000);
        }, 3000);
    }
</script>

</body>
</html>
